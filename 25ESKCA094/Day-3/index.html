<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
    <link rel="stylesheet" href="form.css">
</head>
<body>

<div class="container">
    <h1>Registration Form</h1>  

    <form>

        <label>Full Name</label>
        <input type="text" placeholder="Enter full name">

        <label>Email Address</label>
        <input type="email" placeholder="Enter email address">

        <div class="row">
            <div class="col">
                <label>Phone Number</label>
                <input type="tel" placeholder="Enter phone number">
            </div>

            <div class="col">
                <label>Birth Date</label>
                <input type="date">
            </div>
        </div>

        <label>Gender</label>

        <div class="gender">
            <label><input type="radio" name="gender"> Male</label>
            <label><input type="radio" name="gender"> Female</label>
            <label><input type="radio" name="gender"> Prefer not to say</label>
        </div>

        <label>Address</label>
        <input type="text" placeholder="Enter street address">
         </label><br>
            <label for="pwdPassword">Password:</label>
             <input type="password" placeholder="Password" checkout />
             <br>
             <label for="pwdPassword">ConfirmPassword:</label>
             
             <input type="confirmpassword" placeholder="Confirm Password"checkout />


        <button type="submit">Submit</button>

    </form>

</div>

</body>
</html>
